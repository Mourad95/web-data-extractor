<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-commerce Price Scanner</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow" id="domainLabel">Current website</p>
          <h1>Price Scanner</h1>
        </div>
        <span class="status-dot" aria-hidden="true"></span>
      </header>

      <section class="config-panel" aria-labelledby="configTitle">
        <div class="section-heading">
          <h2 id="configTitle">Configuration</h2>
          <button id="saveConfig" class="button compact" type="button">Save Configuration</button>
        </div>

        <form id="configForm" class="config-form">
          <label>
            <span>Search URL</span>
            <input id="searchUrl" type="url" placeholder="https://site.com/search?q={query}">
          </label>
          <label>
            <span>Product name selector</span>
            <input id="nameSelector" type="text" placeholder="Auto-detect">
          </label>
          <label>
            <span>Price selector</span>
            <input id="priceSelector" type="text" placeholder="Auto-detect">
          </label>
          <label>
            <span>Add to cart selector</span>
            <input id="addToCartSelector" type="text" placeholder="Auto-detect">
          </label>
          <label>
            <span>Quantity selector</span>
            <input id="quantitySelector" type="text" placeholder="Optional">
          </label>
        </form>
      </section>

      <section class="generic-panel" aria-labelledby="genericTitle">
        <div class="section-heading">
          <h2 id="genericTitle">Generic Scan</h2>
        </div>

        <div class="toolbar" aria-label="Scan controls">
          <button id="scanPage" class="button primary" type="button">
            <span>Scan Current Page</span>
          </button>
          <button id="scanList" class="button secondary" type="button">
            <span>Scan Custom List</span>
          </button>
        </div>

        <label class="list-editor">
          <span>Custom product list</span>
          <textarea id="productList" rows="6" spellcheck="false"></textarea>
        </label>
      </section>

      <section class="feedback" aria-live="polite">
        <div id="spinner" class="spinner" hidden></div>
        <p id="statusText">Open an e-commerce page, then scan the current page.</p>
      </section>

      <section class="results-panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Product</th>
                <th scope="col">Price</th>
                <th scope="col">Qty</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr class="empty-row">
                <td colspan="3">No results yet.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="summary">
          <div>
            <span>Subtotal</span>
            <strong id="subtotal">0,00 €</strong>
          </div>
          <div>
            <span>BIENVENUE20</span>
            <strong id="discount">0,00 €</strong>
          </div>
          <div class="total">
            <span>Total</span>
            <strong id="total">0,00 €</strong>
          </div>
        </div>
      </section>

      <footer class="footer">
        <button id="exportResults" class="button export" type="button" disabled>Export</button>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
